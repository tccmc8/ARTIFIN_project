version: "3.9"

services:
  db:
    image: postgres:16
    container_name: student-habits-monitoring-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: student-habits-monitoring-adminer
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8080:8080"
    depends_on:
      - db

  grafana:
    image: grafana/grafana-oss
    container_name: student-habits-monitoring-grafana
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - grafana_data:/var/lib/grafana

  mlflow:
    image: python:3.11-slim
    container_name: student-habits-mlflow
    command: >
      bash -c "pip install mlflow psycopg2-binary --quiet &&
               mlflow server
               --backend-store-uri postgresql://postgres:example@db:5432/test
               --default-artifact-root /mlruns
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mlruns_data:/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000

  api:
    image: python:3.11-slim
    container_name: student-habits-api
    working_dir: /app
    command: >
      bash -c "pip install fastapi uvicorn[standard] pydantic joblib pandas scikit-learn --quiet &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - .:/app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000

volumes:
  postgres_data:
  grafana_data:
  mlruns_data: 
