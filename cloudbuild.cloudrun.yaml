# Cloud Build config for the Cloud Run image.
# Builds Dockerfile.cloudrun (which includes models/) and pushes to
# Artifact Registry.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '-t'
      - 'gcr.io/$PROJECT_ID/student-habits-api:latest'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/student-habits-api:latest'
